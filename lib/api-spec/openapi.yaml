openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ForgePulse Manufacturing Execution System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard KPIs and summaries
  - name: production
    description: Production planning and orders
  - name: inventory
    description: Inventory management
  - name: quality
    description: Quality control
  - name: procurement
    description: Procurement and suppliers
  - name: workforce
    description: Workforce management
  - name: reports
    description: Reports and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Dashboard
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get dashboard KPI metrics
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/production-chart:
    get:
      operationId: getProductionChart
      tags: [dashboard]
      summary: Get production output vs target chart data
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionChartPoint"

  /dashboard/oee-trend:
    get:
      operationId: getOeeTrend
      tags: [dashboard]
      summary: Get OEE trend data
      responses:
        "200":
          description: OEE trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OeeTrendPoint"

  /dashboard/inventory-by-category:
    get:
      operationId: getInventoryByCategory
      tags: [dashboard]
      summary: Get inventory value by category
      responses:
        "200":
          description: Inventory by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryValue"

  /dashboard/defect-reasons:
    get:
      operationId: getDefectReasons
      tags: [dashboard]
      summary: Get top defect reasons
      responses:
        "200":
          description: Defect reasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefectReason"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get dashboard alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/capacity-utilization:
    get:
      operationId: getCapacityUtilization
      tags: [dashboard]
      summary: Get capacity utilization by department
      responses:
        "200":
          description: Capacity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapacityPoint"

  # Production Orders
  /production/orders:
    get:
      operationId: getProductionOrders
      tags: [production]
      summary: List production orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Production orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrderList"
    post:
      operationId: createProductionOrder
      tags: [production]
      summary: Create production order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  /production/orders/{id}:
    get:
      operationId: getProductionOrder
      tags: [production]
      summary: Get production order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Production order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"
    patch:
      operationId: updateProductionOrder
      tags: [production]
      summary: Update production order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  # Work Orders
  /production/work-orders:
    get:
      operationId: getWorkOrders
      tags: [production]
      summary: List work orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Work orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [production]
      summary: Create work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /production/schedule:
    get:
      operationId: getProductionSchedule
      tags: [production]
      summary: Get production schedule (Gantt data)
      responses:
        "200":
          description: Schedule data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleItem"

  /production/summary:
    get:
      operationId: getProductionSummary
      tags: [production]
      summary: Get production summary by department
      responses:
        "200":
          description: Department production summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentSummary"

  # Inventory
  /inventory/items:
    get:
      operationId: getInventoryItems
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: warehouse
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemList"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/items/{id}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  /inventory/low-stock:
    get:
      operationId: getLowStockItems
      tags: [inventory]
      summary: Get low stock alerts
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/abc-analysis:
    get:
      operationId: getAbcAnalysis
      tags: [inventory]
      summary: Get ABC analysis data
      responses:
        "200":
          description: ABC analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AbcItem"

  /inventory/warehouses:
    get:
      operationId: getWarehouses
      tags: [inventory]
      summary: List warehouses
      responses:
        "200":
          description: Warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"

  # Quality
  /quality/inspections:
    get:
      operationId: getInspections
      tags: [quality]
      summary: List quality inspections
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Inspections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"
    post:
      operationId: createInspection
      tags: [quality]
      summary: Create inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InspectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /quality/defects:
    get:
      operationId: getDefects
      tags: [quality]
      summary: List defects
      responses:
        "200":
          description: Defects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Defect"

  /quality/defect-trend:
    get:
      operationId: getDefectTrend
      tags: [quality]
      summary: Get defect trend over time
      responses:
        "200":
          description: Defect trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefectTrendPoint"

  /quality/summary:
    get:
      operationId: getQualitySummary
      tags: [quality]
      summary: Get quality summary KPIs
      responses:
        "200":
          description: Quality summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualitySummary"

  /quality/supplier-scores:
    get:
      operationId: getSupplierQualityScores
      tags: [quality]
      summary: Get supplier quality performance scores
      responses:
        "200":
          description: Supplier scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierScore"

  # Procurement
  /procurement/suppliers:
    get:
      operationId: getSuppliers
      tags: [procurement]
      summary: List suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Suppliers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [procurement]
      summary: Create supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /procurement/purchase-orders:
    get:
      operationId: getPurchaseOrders
      tags: [procurement]
      summary: List purchase orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [procurement]
      summary: Create purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /procurement/purchase-orders/{id}:
    patch:
      operationId: updatePurchaseOrder
      tags: [procurement]
      summary: Update purchase order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /procurement/spend-analytics:
    get:
      operationId: getSpendAnalytics
      tags: [procurement]
      summary: Get spend analytics by category and month
      responses:
        "200":
          description: Spend analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendAnalytics"

  /procurement/summary:
    get:
      operationId: getProcurementSummary
      tags: [procurement]
      summary: Get procurement summary KPIs
      responses:
        "200":
          description: Procurement summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcurementSummary"

  # Workforce
  /workforce/employees:
    get:
      operationId: getEmployees
      tags: [workforce]
      summary: List employees
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Employees list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [workforce]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /workforce/summary:
    get:
      operationId: getWorkforceSummary
      tags: [workforce]
      summary: Get workforce summary KPIs
      responses:
        "200":
          description: Workforce summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkforceSummary"

  /workforce/attendance:
    get:
      operationId: getAttendance
      tags: [workforce]
      summary: Get attendance records
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /workforce/department-utilization:
    get:
      operationId: getDepartmentUtilization
      tags: [workforce]
      summary: Get department labor utilization
      responses:
        "200":
          description: Utilization data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentUtilization"

  # Reports
  /reports/production:
    get:
      operationId: getProductionReport
      tags: [reports]
      summary: Get production report data
      parameters:
        - name: month
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Production report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionReport"

  /reports/executive-summary:
    get:
      operationId: getExecutiveSummary
      tags: [reports]
      summary: Get executive summary report
      responses:
        "200":
          description: Executive summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveSummary"

  /reports/forecast:
    get:
      operationId: getForecast
      tags: [reports]
      summary: Get demand forecast data
      responses:
        "200":
          description: Forecast data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role, name]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
        email:
          type: ["string", "null"]
        department:
          type: ["string", "null"]

    DashboardKpis:
      type: object
      required: [oee, productionEfficiency, onTimeDelivery, defectRate, inventoryTurnover, monthlyProduction, pendingOrders]
      properties:
        oee:
          type: number
        oeeChange:
          type: number
        productionEfficiency:
          type: number
        productionEfficiencyChange:
          type: number
        onTimeDelivery:
          type: number
        onTimeDeliveryChange:
          type: number
        defectRate:
          type: number
        defectRateChange:
          type: number
        inventoryTurnover:
          type: number
        inventoryTurnoverChange:
          type: number
        monthlyProduction:
          type: integer
        monthlyProductionChange:
          type: number
        pendingOrders:
          type: integer

    ProductionChartPoint:
      type: object
      required: [month, actual, target]
      properties:
        month:
          type: string
        actual:
          type: integer
        target:
          type: integer

    OeeTrendPoint:
      type: object
      required: [month, oee]
      properties:
        month:
          type: string
        oee:
          type: number

    CategoryValue:
      type: object
      required: [name, value, percentage]
      properties:
        name:
          type: string
        value:
          type: number
        percentage:
          type: number

    DefectReason:
      type: object
      required: [reason, count, percentage]
      properties:
        reason:
          type: string
        count:
          type: integer
        percentage:
          type: number

    Alert:
      type: object
      required: [id, type, message, severity, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        severity:
          type: string
        createdAt:
          type: string

    ActivityItem:
      type: object
      required: [id, action, module, description, user, timestamp]
      properties:
        id:
          type: integer
        action:
          type: string
        module:
          type: string
        description:
          type: string
        user:
          type: string
        timestamp:
          type: string

    CapacityPoint:
      type: object
      required: [department, capacity, utilized]
      properties:
        department:
          type: string
        capacity:
          type: integer
        utilized:
          type: integer
        utilization:
          type: number

    ProductionOrder:
      type: object
      required: [id, orderNumber, product, quantity, plannedStart, plannedEnd, status, department, priority]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        product:
          type: string
        quantity:
          type: integer
        completedQuantity:
          type: integer
        plannedStart:
          type: string
        plannedEnd:
          type: string
        actualStart:
          type: ["string", "null"]
        actualEnd:
          type: ["string", "null"]
        status:
          type: string
        department:
          type: string
        priority:
          type: string
        oee:
          type: ["number", "null"]
        defectRate:
          type: ["number", "null"]

    ProductionOrderList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProductionOrder"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductionOrderInput:
      type: object
      required: [product, quantity, plannedStart, plannedEnd, department, priority]
      properties:
        product:
          type: string
        quantity:
          type: integer
        plannedStart:
          type: string
        plannedEnd:
          type: string
        department:
          type: string
        priority:
          type: string
        notes:
          type: string

    ProductionOrderUpdate:
      type: object
      properties:
        status:
          type: string
        completedQuantity:
          type: integer
        actualStart:
          type: string
        actualEnd:
          type: string
        oee:
          type: number
        defectRate:
          type: number

    WorkOrder:
      type: object
      required: [id, woNumber, productionOrderId, operation, machine, operator, plannedStart, plannedEnd, status, department]
      properties:
        id:
          type: integer
        woNumber:
          type: string
        productionOrderId:
          type: integer
        operation:
          type: string
        machine:
          type: string
        operator:
          type: string
        plannedStart:
          type: string
        plannedEnd:
          type: string
        status:
          type: string
        department:
          type: string
        progress:
          type: number

    WorkOrderInput:
      type: object
      required: [productionOrderId, operation, machine, operator, plannedStart, plannedEnd, department]
      properties:
        productionOrderId:
          type: integer
        operation:
          type: string
        machine:
          type: string
        operator:
          type: string
        plannedStart:
          type: string
        plannedEnd:
          type: string
        department:
          type: string

    ScheduleItem:
      type: object
      required: [id, name, start, end, department, status, progress]
      properties:
        id:
          type: integer
        name:
          type: string
        start:
          type: string
        end:
          type: string
        department:
          type: string
        status:
          type: string
        progress:
          type: number

